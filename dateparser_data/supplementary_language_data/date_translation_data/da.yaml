tuesday:
    - tir
thursday:
    - tor
relative-type:
    0 hour ago:
        - i den kommende time
    0 minute ago:
        - i det kommende minut
skip: ["cirka", "d.", "den", "kl", "kl."]

sentence_splitter_group: 1

month:
    - måneder
week:
    - uger
day:
    - dage
hour:
    - timer
minute:
    - minutter
second:
    - sekunder

ago:
    - siden
in:
    - i

relative-type-regex:
    \1 hour ago:
        - for (\d+[.,]?\d*)\s*h
        - for (\d+[.,]?\d*) timer
    \1 minute ago:
        - for (\d+[.,]?\d*)\s*m
        - for (\d+[.,]?\d*) minutter
        - for (\d+[.,]?\d*) min siden
    \1 second ago:
        - for (\d+[.,]?\d*)\s*s
        - for (\d+[.,]?\d*) sekunder
        - for (\d+[.,]?\d*) sek siden

    \1 month ago:
        - for (\d+[.,]?\d*) md siden
        - for (\d+[.,]?\d*) mdr siden
simplifications:
    - en: '1'
    - et: '1'
    - (\d+[.,]?\d*)\s*hr(s?): \1 time\2
    - (\d+[.,]?\d*)\s*min(s?): \1 minut\2
    - (\d+[.,]?\d*)\s*sec(s?): \1 sekund\2
    - middag: '12:00'
    - midnat: '00:00'
    - (\d+[.,]?\d*)h(\d+[.,]?\d*)m?: \1:\2
    - mindre end 1 minut siden: 45 seconds
