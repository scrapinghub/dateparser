relative-type-regex:
    \1 day ago:
        - acum (\d+[.,]?\d*) zile
    in \1 day:
        - peste (\d+[.,]?\d*) zile
    in \1 year:
        - peste (\d+[.,]?\d*) ani
skip: ["de", "la"]

sentence_splitter_group: 1

wednesday:
    - Mi

february:
    - Febr
march:
    - Mart
september:
    - Sep
november:
    - Noiem

year:
    - ani
month:
    - luna
    - luni
week:
    - săptămâni
day:
    - zile
hour:
    - ore
minute:
    - minute
second:
    - secunde

ago:
    - în urmă
in:
    - în
